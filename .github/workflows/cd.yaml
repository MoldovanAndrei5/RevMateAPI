name: Push code to Lambda
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  update-layer:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and update layer
        run: |
          mkdir -p layer/python
          pip install -r requirements.txt -t layer/python
          cd layer && zip -r ../layer.zip .

          aws s3 cp ../layer.zip s3://revmate-storage/lambda-layers/layer.zip

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name dependenciesBackend \
            --content S3Bucket=revmate-storage,S3Key=lambda-layers/layer.zip \
            --compatible-runtimes python3.14 \
            --query 'LayerVersionArn' \
            --output text)

          aws lambda update-function-configuration \
            --function-name carBackend \
            --layers $LAYER_ARN

          aws lambda wait function-updated \
            --function-name carBackend

      - name: Clean up old layer versions
        run: |
          OLD_VERSIONS=$(aws lambda list-layer-versions \
            --layer-name dependenciesBackend \
            --query 'LayerVersions[1:].Version' \
            --output text)

          for VERSION in $OLD_VERSIONS; do
            aws lambda delete-layer-version \
              --layer-name dependenciesBackend \
              --version-number $VERSION
            echo "Deleted layer version $VERSION"
          done

  update-lambda:
    runs-on: ubuntu-latest
    needs: update-layer
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Zip Lambda function
        run: |
          zip -r function.zip *

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Lambda code
        run: |
          aws lambda wait function-updated \
            --function-name carBackend

          aws lambda update-function-code \
            --function-name carBackend \
            --zip-file fileb://function.zip \
            --query 'FunctionArn' \
            --output text