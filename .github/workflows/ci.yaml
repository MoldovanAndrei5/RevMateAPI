name: CI
on:
  push:
    branches:
      - main  
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
          
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (compile all .py files)
        run: python -m compileall -q .
        
      - name: Import check
        env:
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_NAME: "ci_db"
          DB_USERNAME: "ci_user"
          DB_PASSWORD: "ci_password"
        run: python -c "import main"